
<style>

</style>

<div id="app">

<div class="screen active" id="screen-list">
  <div class="topbar">
    <span class="topbar-leaf">🌿</span>
    <span class="topbar-title">Enciclopedia de flores</span>
  </div>

  <div class="ac-panel">
    <div class="search-row">
      <span class="search-icon">🔍</span>
      <input id="search-input" type="text" placeholder="Buscar flor..." oninput="filterFlowers()">
    </div>
    <button class="filter-btn" onclick="toggleTags()">
      <span id="ftoggle-icon">🏷️</span>
      <span id="ftoggle-lbl">Filtrar por etiquetas</span>
    </button>
    <div class="tags-area" id="tags-area">
      <div>
        <div class="cat-label">🎨 Color</div>
        <div class="tag-row" id="t-color"></div>
      </div>
      <div>
        <div class="cat-label">🍂 Estación</div>
        <div class="tag-row" id="t-season"></div>
      </div>
      <div>
        <div class="cat-label">🌸 Forma</div>
        <div class="tag-row" id="t-shape"></div>
      </div>
      <div>
        <div class="cat-label">🌍 Origen</div>
        <div class="tag-row" id="t-origin"></div>
      </div>
      <div>
        <div class="cat-label">✨ Ambiente</div>
        <div class="tag-row" id="t-vibe"></div>
      </div>
    </div>
  </div>

  <div class="results-label" id="results-lbl"></div>
  <div class="flower-grid" id="flower-grid"></div>

  <div class="ac-footer">
    <div class="ac-btn-hint"><span class="ac-btn-badge teal">A</span> Ver</div>
    <div class="ac-btn-hint"><span class="ac-btn-badge red">B</span> Cerrar</div>
  </div>
</div>

<div class="screen" id="screen-detail">
  <div class="topbar">
    <button class="topbar-back" onclick="showList()">←</button>
    <span class="topbar-title" id="d-header">Flor</span>
  </div>
  <div class="detail-scroll">
    <div class="detail-hero" id="d-hero"></div>
    <div class="detail-bubble">
      <div class="detail-name" id="d-name"></div>
      <div class="detail-latin" id="d-latin"></div>
      <div class="detail-desc" id="d-desc"></div>
      <div class="detail-tags-title">Etiquetas</div>
      <div class="detail-tags" id="d-tags"></div>
    </div>
  </div>
  <div class="ac-footer">
    <div class="ac-btn-hint"><span class="ac-btn-badge red">B</span> Volver</div>
  </div>
</div>
</div>

<script>
const CATS={
  color:{id:'t-color',cls:'tc',tags:['Rosa','Rojo','Blanco','Amarillo','Naranja','Violeta','Azul','Lila','Multicolor']},
  season:{id:'t-season',cls:'ts',tags:['Primavera','Verano','Otoño','Invierno','Todo el año']},
  shape:{id:'t-shape',cls:'tf',tags:['Trompeta','Estrella','Copa','Racimo','Pompón','Parasol','Tubo','Margarita']},
  origin:{id:'t-origin',cls:'to',tags:['Europa','Asia','América','África','Mediterráneo','Japón']},
  vibe:{id:'t-vibe',cls:'tv',tags:['Romántico','Silvestre','Tropical','Clásico','Delicado','Festivo','Melancólico','Fresco']},
};
const TAG_STYLE={
  color:{bg:'#fce4ec',color:'#a3143a',border:'#f4a0bb'},
  season:{bg:'#e8f5e9',color:'#1b5e20',border:'#81c784'},
  shape:{bg:'#e3f2fd',color:'#0d47a1',border:'#64b5f6'},
  origin:{bg:'#fff8e1',color:'#e65100',border:'#ffcc02'},
  vibe:{bg:'#f3e5f5',color:'#4a148c',border:'#ba68c8'},
};
const FLOWERS=[
  {id:1,name:'Rosa',latin:'Rosa spp.',e:'🌹',
   desc:'La reina indiscutible de las flores. Con su perfume embriagador y sus pétalos aterciopelados, la rosa ha simbolizado el amor y la belleza a lo largo de toda la historia. Existen miles de variedades.',
   tags:['Rosa','Rojo','Blanco','Amarillo','Primavera','Verano','Copa','Europa','Romántico','Clásico']},
  {id:2,name:'Girasol',latin:'Helianthus annuus',e:'🌻',
   desc:'El girasol sigue la trayectoria del sol durante el día, fenómeno llamado heliotropismo. Sus grandes cabezas amarillas son símbolo de alegría y pueden alcanzar más de tres metros de altura.',
   tags:['Amarillo','Verano','Margarita','América','Festivo','Silvestre']},
  {id:3,name:'Lavanda',latin:'Lavandula angustifolia',e:'💜',
   desc:'Originaria del Mediterráneo, la lavanda es famosa por su aroma relajante y sus delicadas flores violetas en espiga. Se usa en perfumería, aromaterapia y cocina, y atrae a las abejas.',
   tags:['Violeta','Lila','Verano','Racimo','Mediterráneo','Romántico','Fresco','Delicado']},
  {id:4,name:'Cerezo',latin:'Prunus serrulata',e:'🌸',
   desc:'El hanami o contemplación del cerezo en flor es una de las tradiciones más queridas de Japón. Sus delicados pétalos rosas duran solo unos días, recordándonos la fugacidad de la belleza.',
   tags:['Rosa','Primavera','Copa','Japón','Asia','Romántico','Melancólico','Delicado']},
  {id:5,name:'Tulipán',latin:'Tulipa spp.',e:'🌷',
   desc:'Llegado de Asia Central a Europa en el siglo XVI, el tulipán provocó la mayor burbuja especulativa de la historia: la "tulipomanía" holandesa. Sus formas elegantes lo hacen eterno favorito.',
   tags:['Rosa','Rojo','Amarillo','Blanco','Primavera','Copa','Europa','Asia','Clásico','Romántico']},
  {id:6,name:'Orquídea',latin:'Orchidaceae',e:'🪷',
   desc:'Con más de 28.000 especies, las orquídeas son una de las familias más grandes del reino vegetal. Sus flores son altamente especializadas para atraer a polinizadores específicos.',
   tags:['Violeta','Rosa','Blanco','Multicolor','Todo el año','Tubo','Asia','América','Tropical','Delicado']},
  {id:7,name:'Margarita',latin:'Bellis perennis',e:'🌼',
   desc:'La margarita silvestre crece en prados y cunetas con alegre simplicidad. En la tradición popular se deshojaba para saber si alguien te quería o no.',
   tags:['Blanco','Amarillo','Primavera','Todo el año','Margarita','Europa','Silvestre','Fresco']},
  {id:8,name:'Hibisco',latin:'Hibiscus rosa-sinensis',e:'🌺',
   desc:'Flor tropical por excelencia, el hibisco luce grandes flores en forma de trompeta en tonos vibrantes. Es la flor nacional de Malasia y se usa para hacer infusiones y tintes naturales.',
   tags:['Rojo','Naranja','Rosa','Verano','Trompeta','Asia','África','Tropical','Festivo']},
  {id:9,name:'Hortensia',latin:'Hydrangea spp.',e:'💐',
   desc:'Las hortensias cambian de color según el pH del suelo: ácido para azul, alcalino para rosa. Originarias de Japón, son protagonistas de jardines y arreglos florales por todo el mundo.',
   tags:['Azul','Rosa','Lila','Blanco','Verano','Otoño','Pompón','Japón','Asia','Romántico','Clásico']},
  {id:10,name:'Amapola',latin:'Papaver rhoeas',e:'🌸',
   desc:'La amapola roja de los campos de cereal es símbolo de recuerdo y esperanza. Sus pétalos sedosos y efímeros caen al menor toque. Fue asociada al sueño y al descanso en el mundo antiguo.',
   tags:['Rojo','Naranja','Primavera','Verano','Copa','Europa','Melancólico','Silvestre']},
  {id:11,name:'Crisantemo',latin:'Chrysanthemum spp.',e:'🌸',
   desc:'En Asia oriental, el crisantemo es símbolo de longevidad y nobleza. En Japón aparece en el sello imperial. Sus pétalos se disponen en pompones perfectos y florece en otoño.',
   tags:['Amarillo','Blanco','Violeta','Otoño','Pompón','Japón','Asia','Clásico','Melancólico']},
  {id:12,name:'Dalia',latin:'Dahlia spp.',e:'🌸',
   desc:'Originaria de México, la dalia fue llevada a Europa en el siglo XVIII. Con más de 20.000 variedades registradas, ofrece una variedad de formas y colores inigualable.',
   tags:['Rojo','Naranja','Violeta','Rosa','Multicolor','Verano','Otoño','Pompón','América','Festivo','Clásico']},
];

let sel=new Set(),open=false;

function catOf(tag){
  return Object.entries(CATS).find(([,c])=>c.tags.includes(tag));
}

function buildTags(){
  Object.entries(CATS).forEach(([cat,cfg])=>{
    const el=document.getElementById(cfg.id);
    el.innerHTML='';
    cfg.tags.forEach(tag=>{
      const b=document.createElement('button');
      b.className='tag '+cfg.cls;
      b.textContent=tag;b.dataset.tag=tag;
      b.onclick=()=>toggleTag(tag,b);
      el.appendChild(b);
    });
  });
}

function toggleTag(tag,btn){
  sel.has(tag)?sel.delete(tag):sel.add(tag);
  btn.classList.toggle('selected',sel.has(tag));
  filterFlowers();
}

function toggleTags(){
  open=!open;
  document.getElementById('tags-area').classList.toggle('open',open);
  document.getElementById('ftoggle-lbl').textContent=open?'Ocultar etiquetas':'Filtrar por etiquetas';
}

function filterFlowers(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const filtered=FLOWERS.filter(f=>{
    const nOk=!q||f.name.toLowerCase().includes(q)||f.latin.toLowerCase().includes(q);
    const tOk=sel.size===0||[...sel].every(t=>f.tags.includes(t));
    return nOk&&tOk;
  });
  renderGrid(filtered);
}

function renderGrid(list){
  const g=document.getElementById('flower-grid');
  const lbl=document.getElementById('results-lbl');
  lbl.textContent=list.length===FLOWERS.length?'':list.length+' resultado'+(list.length!==1?'s':'');
  if(!list.length){
    g.innerHTML='<div class="empty"><span>🌱</span>No se encontraron flores</div>';
    return;
  }
  g.innerHTML='';
  list.forEach(f=>{
    const c=document.createElement('div');
    c.className='fcard';
    c.innerHTML=`<div class="fcard-img">${f.e}</div><div class="fcard-tab">${f.name}</div>`;
    c.onclick=()=>showDetail(f);
    g.appendChild(c);
  });
}

function showDetail(f){
  document.getElementById('d-header').textContent=f.name;
  document.getElementById('d-hero').textContent=f.e;
  document.getElementById('d-name').textContent=f.name;
  document.getElementById('d-latin').textContent=f.latin;
  document.getElementById('d-desc').textContent=f.desc;
  const dt=document.getElementById('d-tags');
  dt.innerHTML='';
  f.tags.forEach(tag=>{
    const ce=catOf(tag);
    const st=ce?TAG_STYLE[ce[0]]:{bg:'#eee',color:'#555',border:'#ccc'};
    const chip=document.createElement('span');
    chip.className='dtag';
    chip.textContent=tag;
    chip.style.background=st.bg;chip.style.color=st.color;chip.style.borderColor=st.border;
    chip.onclick=()=>{showList();applyTag(tag,ce)};
    dt.appendChild(chip);
  });
  document.getElementById('screen-list').classList.remove('active');
  document.getElementById('screen-detail').classList.add('active');
  document.getElementById('screen-detail').querySelector('.detail-scroll').scrollTop=0;
}

function applyTag(tag,ce){
  if(!sel.has(tag)){
    sel.add(tag);
    if(ce){
      const btn=document.querySelector(`#${CATS[ce[0]].id} [data-tag="${tag}"]`);
      if(btn)btn.classList.add('selected');
    }
    if(!open){open=true;document.getElementById('tags-area').classList.add('open');document.getElementById('ftoggle-lbl').textContent='Ocultar etiquetas';}
    filterFlowers();
  }
}

function showList(){
  document.getElementById('screen-detail').classList.remove('active');
  document.getElementById('screen-list').classList.add('active');
}

buildTags();renderGrid(FLOWERS);
</script>
